<!DOCTYPE html>
<html lang="en">
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>
 <style> /* Style for the website */ 
    body { font-family: sans-serif; margin: 0; padding: 0; }
     /* Style for the top menu */ 
    #menu { background-color: #333; color: #fff; display: flex; justify-content: space-around; padding: 10px; } /* Style for menu items */ 
    #menu a { color: #fff; text-decoration: none; } /* Style for the main content */ 
    #main { padding: 10px; } /* Style for the light mode button */ 
    #light-mode-btn { background-color: #fff; border: none; color: #333; padding: 5px 10px; text-decoration: none; } /* Style for the dark mode button */ 
    #dark-mode-btn { background-color: #333; border: none; color: #fff; padding: 5px 10px; text-decoration: none; } 
</style>
 <script> 
    function switchToLightMode() { 
        document.body.style.backgroundColor = "#fff"; 
        document.body.style.color = "#333"; 
        document.getElementById("light-mode-btn").style.display = "none"; 
        document.getElementById("dark-mode-btn").style.display = "inline"; } 
    function switchToDarkMode() { 
        document.body.style.backgroundColor = "#333"; 
        document.body.style.color = "#fff"; 
        document.getElementById("light-mode-btn").style.display = "inline"; 
        document.getElementById("dark-mode-btn").style.display = "none"; } 
</script>
 </head> 
<body> 
    <div id="menu"> 
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a> 
    </div> 
    <div id="main"> 
        <h1>Welcome to my website!</h1>
        <p>This website has a dark and light mode that you can switch between using the buttons below.</p>
        <button id="light-mode-btn" onclick="switchToLightMode()">Light Mode</button> 
        <button id="dark-mode-btn" onclick="switchToDarkMode()" style="display: none;">Dark Mode</button> 
    </div> 
</body> 
</html>
